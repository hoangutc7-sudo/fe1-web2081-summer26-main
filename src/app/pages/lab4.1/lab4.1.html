<div class="max-w-md mx-auto bg-white shadow rounded p-6">
  <h2 class="text-2xl font-bold mb-5">Bài 1 - Thêm sản phẩm</h2>

  <form [formGroup]="addForm" (ngSubmit)="submitForm()">

    <label class="block mb-2">Tên sản phẩm</label>
    <input
      type="text"
      formControlName="name"
      class="w-full border rounded p-2 mb-3"
    >

    @if(addForm.get('name')?.invalid && addForm.get('name')?.touched){
      <p class="text-red-500 mb-3">Name bắt buộc</p>
    }

    <label class="block mb-2">Giá</label>
    <input
      type="number"
      formControlName="price"
      class="w-full border rounded p-2 mb-3"
    >

    @if(addForm.get('price')?.invalid && addForm.get('price')?.touched){
      <p class="text-red-500 mb-3">Price phải lớn hơn 0</p>
    }

    <label class="block mb-2">Danh mục</label>
    <input
      type="text"
      formControlName="category"
      class="w-full border rounded p-2 mb-5"
    >

    @if(addForm.get('category')?.invalid && addForm.get('category')?.touched){
      <p class="text-red-500 mb-3">Category bắt buộc</p>
    }

    <button
      class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700"
    >
      Thêm
    </button>

  </form>
</div>
