<form [formGroup]="addForm" (ngSubmit)="submitForm()">

  <div>
    <label>Title</label>
    <input type="text" formControlName="title">

    @if(addForm.get('title')?.invalid && addForm.get('title')?.touched){
      <p style="color:red">Title là bắt buộc</p>
    }
  </div>

  <div>
    <label>Author</label>
    <input type="text" formControlName="author">
  </div>

  <div>
    <label>Views</label>
    <input type="number" formControlName="views">
  </div>

  <button
    type="submit"
    [disabled]="loading || addForm.invalid">

    {{ loading ? 'Đang gửi' : 'Thêm Story' }}

  </button>

  @if(error){
    <p style="color:red">{{ error }}</p>
  }

</form>
