<h2>Danh sách Stories</h2>

<div *ngIf="loading">
  Đang tải dữ liệu...
</div>

<div *ngIf="error" style="color:red">
  {{ error }}
</div>

<table border="1" cellpadding="8" *ngIf="!loading && !error">
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Author</th>
      <th>Views</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let story of stories">
      <td>{{ story.id }}</td>
      <td>{{ story.title }}</td>
      <td>{{ story.author }}</td>
      <td>{{ story.views }}</td>

      <td>
        <span *ngIf="story.views > 90000" style="color:red;font-weight:bold">
          HOT 🔥
        </span>
      </td>

      <td>
        <button
          (click)="deleteStory(story.id)"
          [disabled]="deletingId === story.id"
        >
          {{ deletingId === story.id ? 'Đang xóa...' : 'Xóa' }}
        </button>
      </td>
    </tr>
  </tbody>
</table>
